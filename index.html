<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسالة إلى نغم</title>
    
    <!-- خطوط عربية كلاسيكية ورومانسية -->
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #2b0f1f 0%, #0d020a 100%);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* خلفية اليراعات المضيئة */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* حاوية المظروف */
        .envelope-container {
            position: relative;
            z-index: 10;
            transition: opacity 1s ease-in-out;
            cursor: pointer;
        }

        /* النص الإرشادي فوق المظروف */
        .instruction {
            position: absolute;
            top: -50px;
            width: 100%;
            text-align: center;
            color: #ffb3c6;
            font-size: 1.2rem;
            animation: pulseText 2s infinite;
            pointer-events: none;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.6; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-5px); }
        }

        /* رسم المظروف بـ CSS */
        .envelope {
            width: 300px;
            height: 200px;
            background: #d4b88c;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .envelope-pocket {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-bottom: 110px solid #c4a475;
            border-left: 150px solid #ceae7e;
            border-right: 150px solid #ceae7e;
            z-index: 3;
            pointer-events: none;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-top: 105px solid #e0c598;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            transform-origin: top;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 4;
            pointer-events: none;
        }

        .envelope-paper {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 280px;
            height: 180px;
            background: #fffdf5;
            z-index: 2;
            transition: all 0.8s ease-in-out 0.4s; /* يتأخر حتى يُفتح الغطاء */
            border: 1px solid #e8e8e8;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* الختم الأحمر */
        .wax-seal {
            position: absolute;
            top: 105px;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45px;
            height: 45px;
            background: radial-gradient(circle, #cc0000, #800000);
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 4px 10px rgba(204,0,0,0.5), inset 0 0 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff9999;
            font-size: 20px;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 4px 10px rgba(204,0,0,0.5); }
            50% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 25px rgba(255, 77, 109, 0.8); }
        }

        /* حركات فتح المظروف */
        .envelope-container.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-container.open .wax-seal {
            opacity: 0;
            transition: opacity 0.3s;
        }

        .envelope-container.open .envelope-paper {
            transform: translateY(-80px);
            z-index: 6;
        }

        /* شاشة عرض الرسالة الكاملة */
        .full-letter-view {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 2, 10, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            transition: opacity 1s ease;
            backdrop-filter: blur(5px);
        }

        .full-letter-view.visible {
            opacity: 1;
        }

        .paper-content {
            background: #fffdf5;
            width: 90%;
            max-width: 600px;
            min-height: 60vh;
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 100% 2rem;
            position: relative;
        }

        /* نص الرسالة المتوهج */
        #typewriter-text {
            font-family: 'Aref Ruqaa', serif;
            font-size: 1.5rem;
            line-height: 2rem;
            color: #4a2f1d;
            white-space: pre-wrap; /* يحافظ على المسافات والأسطر */
        }

        /* المؤشر النابض للكتابة */
        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2rem;
            background-color: #cc0000;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* التوقيع */
        .signature {
            opacity: 0;
            transition: opacity 1.5s ease;
            margin-top: 40px;
            text-align: left;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 15px;
        }
        
        .signature.visible {
            opacity: 1;
        }

    </style>
</head>
<body>

    <!-- خلفية اليراعات -->
    <canvas id="particles-canvas"></canvas>

    <!-- المظروف المغلق -->
    <div class="envelope-container" id="envelope-wrapper" onclick="openEnvelope()">
        <div class="instruction">اضغطي على الختم لفتح الرسالة</div>
        <div class="envelope">
            <div class="envelope-paper"></div>
            <div class="envelope-flap"></div>
            <div class="envelope-pocket"></div>
            <div class="wax-seal">❤</div>
        </div>
    </div>

    <!-- عرض الرسالة من الداخل (تظهر لاحقاً) -->
    <div class="full-letter-view" id="letter-view">
        <div class="paper-content">
            <div id="typewriter-text"></div><span class="cursor" id="cursor"></span>
            
            <div class="signature" id="signature">
                <p class="font-bold text-gray-800 font-cairo text-lg">من إعداد: قيس جازي</p>
                <p class="text-sm text-gray-500 font-cairo mt-1">إلى النغم الذي يسكن قلبي ❤️</p>
            </div>
        </div>
    </div>

    <script>
        // النص الذي سيُكتب تلقائياً
        const messageText = `إلى أجمل ألحان حياتي.. نغم،

لم أكن أعلم أن اسماً يمكن أن يختصر كل هذا الجمال، حتى نطقت باسمكِ لأول مرة.

قبل أن أعرفكِ، كانت الأيام تمر صامتة بلا لون..
ومعكِ، أصبحت كل ثانية في حياتي مقطوعة موسيقية نادرة.
أنتِ النغم الذي أطرب به، والنبض الذي يحييني من جديد.

كل كلمات الغزل تقف عاجزة أمام سحر عينيكِ، وأمام الحنان الذي يسكن قلبكِ.. أنتِ لستِ مجرد حبيبة، أنتِ السيمفونية التي أود أن أستمع إليها للأبد.

أحبكِ اليوم، وغداً، وحتى آخر نغمة في عمري.`;

        let i = 0;
        const speed = 60; // سرعة الكتابة (أقل = أسرع)
        let isWriting = false;

        function typeWriter() {
            if (i < messageText.length) {
                document.getElementById("typewriter-text").innerHTML += messageText.charAt(i);
                i++;
                setTimeout(typeWriter, Math.random() * speed + 20); // سرعة عشوائية لتبدو كالكتابة الحقيقية
            } else {
                // عند انتهاء الكتابة، أظهر التوقيع وأخفِ مؤشر الكتابة
                document.getElementById('cursor').style.display = 'none';
                document.getElementById('signature').classList.add('visible');
            }
        }

        // دالة فتح المظروف
        function openEnvelope() {
            const envelopeWrapper = document.getElementById('envelope-wrapper');
            const letterView = document.getElementById('letter-view');

            // 1. فتح الغطاء
            envelopeWrapper.classList.add('open');

            // 2. بعد ثانية ونصف (بعد أن تخرج الورقة)، أخفِ المظروف وأظهر الشاشة الكاملة
            setTimeout(() => {
                envelopeWrapper.style.opacity = '0';
                
                setTimeout(() => {
                    envelopeWrapper.style.display = 'none';
                    letterView.style.display = 'flex';
                    
                    // 3. تأثير الظهور التدريجي للرسالة
                    setTimeout(() => {
                        letterView.classList.add('visible');
                        
                        // 4. ابدأ الكتابة التلقائية بعد ظهور الورقة
                        setTimeout(typeWriter, 800);
                        
                    }, 100);
                }, 1000);
            }, 1800);
        }

        // --- كود اليراعات المضيئة (الخلفية الساحرة) ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * -1 - 0.5; // تتجه للأعلى بلطف
                // ألوان يراعات (ذهبي وردي خفيف)
                this.color = `hsla(${Math.random() * 30 + 330}, 80%, 70%, ${Math.random() * 0.5 + 0.2})`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                // حركة متموجة خفيفة
                this.x += Math.sin(this.y * 0.02) * 0.3;

                // إعادة اليراعة للأسفل إذا خرجت من الشاشة
                if (this.y < -10) {
                    this.y = canvas.height + 10;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                // تأثير التوهج
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
            }
        }

        function initParticles() {
            for (let i = 0; i < 80; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();
    </script>
</body>
</html>
